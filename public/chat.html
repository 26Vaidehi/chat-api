<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Room</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; display: flex; flex-direction: column; height: 100vh; }
        .header { background: #0f3460; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { color: #e94560; }
        .header span { font-size: 13px; color: #aaa; }
        .header button { background: #e94560; border: none; color: #fff; padding: 0.4rem 1rem; border-radius: 5px; cursor: pointer; }
        .messages { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; display: flex; flex-direction: column; gap: 8px; }
        .message { max-width: 70%; padding: 0.6rem 1rem; border-radius: 10px; font-size: 14px; line-height: 1.4; }
        .message.mine { background: #e94560; align-self: flex-end; border-bottom-right-radius: 2px; }
        .message.others { background: #0f3460; align-self: flex-start; border-bottom-left-radius: 2px; }
        .message.system { background: transparent; color: #aaa; font-size: 12px; align-self: center; font-style: italic; }
        .message .sender { font-size: 11px; font-weight: bold; margin-bottom: 3px; opacity: 0.8; }
        .input-area { background: #16213e; padding: 1rem 1.5rem; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 0.75rem; border: none; border-radius: 5px; background: #0f3460; color: #fff; font-size: 14px; }
        .input-area input::placeholder { color: #aaa; }
        .input-area button { padding: 0.75rem 1.5rem; background: #e94560; border: none; border-radius: 5px; color: #fff; font-size: 14px; cursor: pointer; font-weight: bold; }
        .input-area button:hover { background: #c73652; }
    </style>
</head>
<body>
    <div class="header">
        <h2 id="room-name">Room: general</h2>
        <span id="user-name"></span>
        <button onclick="logout()">Logout</button>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input type="text" id="msg-input" placeholder="Type a message..." onkeypress="handleKey(event)" />
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        const room = localStorage.getItem('room') || 'general';

        if (!token || !username) {
            window.location.href = '/';
        }

        document.getElementById('room-name').innerText = 'Room: ' + room;
        document.getElementById('user-name').innerText = 'Logged in as: ' + username;

        const socket = io({ auth: { token } });

        // Join room
        socket.emit('joinRoom', { username, room });

        // Load message history
        fetch('/messages/' + room, {
            headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => res.json())
        .then(data => {
            data.messages.forEach(m => addMessage(m.username, m.message, m.username === username ? 'mine' : 'others'));
        });

        // Receive messages
        socket.on('message', (data) => {
            if (data.username === 'System') {
                addMessage('', data.message, 'system');
            } else {
                addMessage(data.username, data.message, data.username === username ? 'mine' : 'others');
            }
        });

        function addMessage(sender, message, type) {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            if (type !== 'system') {
                div.innerHTML = `<div class="sender">${sender}</div>${message}`;
            } else {
                div.innerText = message;
            }
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msg-input');
            const message = input.value.trim();
            if (!message) return;
            socket.emit('sendMessage', { message });
            input.value = '';
        }

        function handleKey(e) {
            if (e.key === 'Enter') sendMessage();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }
    </script>
</body>
</html>
